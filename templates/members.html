{% extends 'base.html' %}

{% block title %}Manage Members{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Team Members</h1>

    <!-- Add Member Form -->
    <form method="POST" action="{{ url_for('manage_members') }}" class="d-flex mb-4">
        <input 
            type="text" 
            name="name" 
            placeholder="Add new member" 
            class="form-control me-2" 
            required>
        <button type="submit" class="btn btn-primary">Add Member</button>
    </form>

    <!-- Members Table -->
    <table class="table table-bordered">
        <thead class="table-light">
            <tr>
                <th>Name</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for member in teams %}
            <tr>
                <td>{{ member.name }}</td>
                <td>
                    <!-- Edit Member -->
                    <a href="{{ url_for('edit_member', member_id=member.id) }}" 
                       class="btn btn-warning btn-sm me-2">Edit</a>
                    
                    <!-- Delete Member -->
                    <form 
                        method="POST" 
                        action="{{ url_for('delete_member', member_id=member.id) }}" 
                        class="d-inline">
                        <button 
                            type="submit" 
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Are you sure you want to delete this member?');">
                            Delete
                        </button>
                    </form>
                    
                    <!-- Manage Leave -->
                    <button 
                        class="btn btn-info btn-sm ms-2" 
                        data-bs-toggle="modal" 
                        data-bs-target="#leaveModal{{ member.id }}">
                        Manage Leave
                    </button>

                    <!-- Leave Modal -->
                    <div class="modal fade" id="leaveModal{{ member.id }}" tabindex="-1" aria-labelledby="leaveModalLabel" aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="leaveModalLabel">Manage Leave for {{ member.name }}</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body">
                                    <form method="POST" action="{{ url_for('manage_leave', member_id=member.id) }}">
                                        <div class="mb-3">
                                            <label for="start_date" class="form-label">Leave Start Date</label>
                                            <input type="date" id="start_date" name="start_date" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="end_date" class="form-label">Leave End Date</label>
                                            <input type="date" id="end_date" name="end_date" class="form-control" required>
                                        </div>
                                        <button type="submit" class="btn btn-primary">Save Leave</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
