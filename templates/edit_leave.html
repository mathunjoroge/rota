{% extends 'base.html' %}

{% block title %}Edit Leave{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Edit Leave for {{ leave.member.name }}</h1>

    <form method="POST">
        <div class="mb-3">
            <label for="start_date" class="form-label">Leave Start Date</label>
            <input type="date" id="start_date" name="start_date" class="form-control" value="{{ leave.start_date }}" required>
        </div>
        <div class="mb-3">
            <label for="end_date" class="form-label">Leave End Date</label>
            <input type="date" id="end_date" name="end_date" class="form-control" value="{{ leave.end_date }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
